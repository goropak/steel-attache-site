<svg viewBox="0 0 620 310" width="620" height="310" xmlns="http://www.w3.org/2000/svg"
  style="width:100%;max-width:620px;height:auto;display:block;border-radius:10px;"
  aria-labelledby="thumb-forest-title" role="img">
  <title id="thumb-forest-title">철, 138억 년의 이력서 — 별의 잔해에서 제철소까지</title>
  <rect width="620" height="310" fill="#11161d" rx="10"/>

  <!-- 별빛 배경 -->
  <circle cx="90" cy="60" r="1.5" fill="#ffd9a8" opacity="0.7"/>
  <circle cx="200" cy="40" r="1" fill="#ffd9a8" opacity="0.5"/>
  <circle cx="350" cy="55" r="2" fill="#ffd9a8" opacity="0.6"/>
  <circle cx="500" cy="45" r="1.2" fill="#ffd9a8" opacity="0.4"/>
  <circle cx="560" cy="70" r="1.5" fill="#ffd9a8" opacity="0.7"/>
  <circle cx="150" cy="85" r="1" fill="#ffd9a8" opacity="0.4"/>
  <circle cx="430" cy="80" r="1.3" fill="#ffd9a8" opacity="0.5"/>

  <!-- 상단 타이틀 -->
  <text x="310" y="35" text-anchor="middle" font-size="13" font-weight="700"
    fill="#e8e2d8" font-family="system-ui,sans-serif" letter-spacing="0.05em">철, 138억 년의 이력서</text>
  <text x="310" y="52" text-anchor="middle" font-size="10" fill="#9a8a7a" font-family="system-ui,sans-serif">별의 잔해에서 제철소까지</text>

  <!-- 5단계 흐름 -->
  <!-- 1. 빅뱅 / 초신성 -->
  <rect x="30" y="80" width="95" height="70" rx="6" fill="#1e2d3d"/>
  <text x="77" y="110" text-anchor="middle" font-size="18" fill="#ffd9a8" font-family="system-ui,sans-serif">✦</text>
  <text x="77" y="128" text-anchor="middle" font-size="8.5" font-weight="700" fill="#ffd9a8" font-family="system-ui,sans-serif">초신성 폭발</text>
  <text x="77" y="141" text-anchor="middle" font-size="7.5" fill="#9a8a7a" font-family="system-ui,sans-serif">138억 년 전</text>

  <!-- 화살표 -->
  <polygon points="133,115 127,110 127,120" fill="#3a4654"/>

  <!-- 2. 지구 BIF -->
  <rect x="140" y="80" width="95" height="70" rx="6" fill="#1e2d3d"/>
  <text x="187" y="110" text-anchor="middle" font-size="18" fill="#5a7a9a" font-family="system-ui,sans-serif">⬡</text>
  <text x="187" y="128" text-anchor="middle" font-size="8.5" font-weight="700" fill="#8ab4d4" font-family="system-ui,sans-serif">BIF 퇴적</text>
  <text x="187" y="141" text-anchor="middle" font-size="7.5" fill="#9a8a7a" font-family="system-ui,sans-serif">18~25억 년 전</text>

  <!-- 화살표 -->
  <polygon points="243,115 237,110 237,120" fill="#3a4654"/>

  <!-- 3. 철기시대 -->
  <rect x="250" y="80" width="95" height="70" rx="6" fill="#1e2d3d"/>
  <text x="297" y="110" text-anchor="middle" font-size="18" fill="#c8a060" font-family="system-ui,sans-serif">⚔</text>
  <text x="297" y="128" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c8a060" font-family="system-ui,sans-serif">철기시대</text>
  <text x="297" y="141" text-anchor="middle" font-size="7.5" fill="#9a8a7a" font-family="system-ui,sans-serif">BC 1200~</text>

  <!-- 화살표 -->
  <polygon points="353,115 347,110 347,120" fill="#3a4654"/>

  <!-- 4. 산업혁명 -->
  <rect x="360" y="80" width="95" height="70" rx="6" fill="#1e2d3d"/>
  <text x="407" y="110" text-anchor="middle" font-size="18" fill="#b1471f" font-family="system-ui,sans-serif">♨</text>
  <text x="407" y="128" text-anchor="middle" font-size="8.5" font-weight="700" fill="#b1471f" font-family="system-ui,sans-serif">산업혁명</text>
  <text x="407" y="141" text-anchor="middle" font-size="7.5" fill="#9a8a7a" font-family="system-ui,sans-serif">18세기~</text>

  <!-- 화살표 -->
  <polygon points="463,115 457,110 457,120" fill="#3a4654"/>

  <!-- 5. 현대 제철 -->
  <rect x="470" y="80" width="120" height="70" rx="6" fill="#2b1a1a" stroke="#D62828" stroke-width="1.5"/>
  <text x="530" y="110" text-anchor="middle" font-size="18" fill="#D62828" font-family="system-ui,sans-serif">🏭</text>
  <text x="530" y="128" text-anchor="middle" font-size="8.5" font-weight="800" fill="#D62828" font-family="system-ui,sans-serif">연 18.4억 톤</text>
  <text x="530" y="141" text-anchor="middle" font-size="7.5" fill="#9a8a7a" font-family="system-ui,sans-serif">현대 산업</text>

  <!-- 하단 인용 -->
  <line x1="30" y1="175" x2="590" y2="175" stroke="#3a4654" stroke-width="1"/>
  <text x="310" y="200" text-anchor="middle" font-size="10.5" fill="#e8e2d8" font-weight="600" font-family="system-ui,sans-serif">"철을 알면 지금의 전쟁이 다르게 읽힌다"</text>
  <text x="310" y="220" text-anchor="middle" font-size="9" fill="#6b6459" font-family="system-ui,sans-serif">우주 · 지층 · 제국 · 산업 — 철의 전사(前史)</text>

  <!-- 하단 메타 -->
  <line x1="30" y1="260" x2="590" y2="260" stroke="#3a4654" stroke-width="1"/>
  <text x="30" y="280" font-size="8.5" fill="#6b6459" font-family="system-ui,sans-serif">철강 주재원 · 숲 시리즈 1편 · 공개 자료 기반</text>
  <text x="590" y="280" text-anchor="end" font-size="8.5" fill="#6b6459" font-family="system-ui,sans-serif">© 철강 주재원</text>
</svg>
