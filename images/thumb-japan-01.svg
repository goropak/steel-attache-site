<svg viewBox="0 0 620 310" xmlns="http://www.w3.org/2000/svg"
  style="width:100%;max-width:620px;height:auto;display:block;border-radius:10px;"
  aria-labelledby="thumb-japan-title" role="img">
  <title id="thumb-japan-title">일본 제철 124년 — 야하타에서 US Steel까지</title>
  <rect width="620" height="310" fill="#fbfaf7" rx="10"/>
  <rect width="620" height="44" fill="#11161d" rx="10"/>
  <rect y="34" width="620" height="10" fill="#11161d"/>
  <text x="310" y="27" text-anchor="middle" font-size="13" font-weight="700"
    fill="#e8e2d8" font-family="system-ui,sans-serif" letter-spacing="0.08em">일본 제철 124년 — 야하타에서 US Steel까지</text>

  <!-- 타임라인 축 -->
  <line x1="50" y1="160" x2="570" y2="160" stroke="#c8c0b4" stroke-width="2"/>

  <!-- 1901 야하타 -->
  <circle cx="80" cy="160" r="8" fill="#2b4a6f"/>
  <text x="80" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#2b4a6f" font-family="system-ui,sans-serif">1901</text>
  <text x="80" y="180" text-anchor="middle" font-size="8.5" fill="#4a4a4a" font-family="system-ui,sans-serif">야하타제철</text>
  <text x="80" y="191" text-anchor="middle" font-size="8" fill="#6b6459" font-family="system-ui,sans-serif">설립</text>

  <!-- 1970 NSC -->
  <circle cx="190" cy="160" r="8" fill="#2b4a6f"/>
  <text x="190" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#2b4a6f" font-family="system-ui,sans-serif">1970</text>
  <text x="190" y="180" text-anchor="middle" font-size="8.5" fill="#4a4a4a" font-family="system-ui,sans-serif">신일철</text>
  <text x="190" y="191" text-anchor="middle" font-size="8" fill="#6b6459" font-family="system-ui,sans-serif">출범</text>

  <!-- 2012 NSSMC -->
  <circle cx="330" cy="160" r="8" fill="#b1471f"/>
  <text x="330" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#b1471f" font-family="system-ui,sans-serif">2012</text>
  <text x="330" y="180" text-anchor="middle" font-size="8.5" fill="#4a4a4a" font-family="system-ui,sans-serif">스미토모</text>
  <text x="330" y="191" text-anchor="middle" font-size="8" fill="#6b6459" font-family="system-ui,sans-serif">합병 NSSMC</text>

  <!-- 2025 US Steel -->
  <circle cx="490" cy="160" r="10" fill="#D62828"/>
  <text x="490" y="146" text-anchor="middle" font-size="9" font-weight="700" fill="#D62828" font-family="system-ui,sans-serif">2025.6</text>
  <text x="490" y="180" text-anchor="middle" font-size="9" font-weight="800" fill="#D62828" font-family="system-ui,sans-serif">US Steel</text>
  <text x="490" y="191" text-anchor="middle" font-size="8" fill="#D62828" font-family="system-ui,sans-serif">인수 완료</text>
  <text x="490" y="202" text-anchor="middle" font-size="7.5" fill="#6b6459" font-family="system-ui,sans-serif">149억 달러</text>

  <!-- 화살표 강조 -->
  <polygon points="565,160 555,155 555,165" fill="#D62828"/>

  <!-- 하단 설명 -->
  <line x1="30" y1="230" x2="590" y2="230" stroke="#e6e0d4" stroke-width="1"/>
  <text x="310" y="252" text-anchor="middle" font-size="10" fill="#2b4a6f" font-weight="600" font-family="system-ui,sans-serif">골든셰어 리스크 · 루이지애나 EAF · 한국의 선택은?</text>
  <text x="30" y="275" font-size="8.5" fill="#9a8a7a" font-family="system-ui,sans-serif">자료: 공개 자료 편집실 작성 · 철강 주재원</text>
  <text x="590" y="275" text-anchor="end" font-size="8.5" fill="#9a8a7a" font-family="system-ui,sans-serif">© 철강 주재원</text>
</svg>
