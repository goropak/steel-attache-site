<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>구독 해지 — 철강 주재원</title>
<link rel="stylesheet" href="style.css">
<style>
.unsub-wrap {
  max-width: 480px;
  margin: 80px auto;
  padding: 0 24px;
  text-align: center;
}
.unsub-wrap h1 { font-size: 1.5rem; margin-bottom: 8px; }
.unsub-wrap p  { color: var(--c-text-sub); margin-bottom: 32px; font-size: 0.95rem; }
.unsub-form input[type="email"] {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius);
  font-size: 1rem;
  font-family: var(--font-body);
  margin-bottom: 12px;
  box-sizing: border-box;
}
.unsub-form input[type="email"]:focus {
  outline: none;
  border-color: var(--c-accent);
}
.unsub-btn {
  width: 100%;
  padding: 13px;
  background: var(--c-accent);
  color: #fff;
  border: none;
  border-radius: 99px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-body);
}
.unsub-btn:hover { opacity: .88; }
.back-link { display: block; margin-top: 24px; color: var(--c-text-sub); font-size: 0.875rem; }
</style>
</head>
<body>

<header class="masthead"><div class="wrap">
  <div class="mh-brand">
    <svg class="mh-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="1" y="1" width="38" height="38" rx="9" fill="#11161d" stroke="#3a4654"/>
      <path d="M20 8 L31 30 H9 Z" fill="none" stroke="#D62828" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M20 20 L26 30 H14 Z" fill="#D62828"/>
      <circle cx="20" cy="26.5" r="1.7" fill="#ffd9a8"/>
    </svg>
    <div class="mh-title"><a href="index.html">철강 주재원</a><span class="sub">Steel Attaché</span></div>
  </div>
</div></header>

<div class="unsub-wrap">
  <h1>구독 해지</h1>
  <p>해지할 이메일 주소를 입력하시면 즉시 처리됩니다.</p>

  <form class="unsub-form" action="https://formspree.io/f/FORMSPREE_ID" method="POST" id="unsub-form">
    <input type="hidden" name="_subject" value="[철강 주재원] 구독 해지 요청">
    <input type="hidden" name="type" value="unsubscribe">
    <input type="email" name="email" id="unsub-email" placeholder="이메일 주소" required autocomplete="email">
    <button type="submit" class="unsub-btn">구독 해지</button>
  </form>
  <a href="index.html" class="back-link">← 홈으로 돌아가기</a>
</div>

<script>
/* URL 파라미터로 이메일 미리 채우기 (?email=xxx) */
(function() {
  var params = new URLSearchParams(window.location.search);
  var email = params.get('email');
  if (email) {
    var inp = document.getElementById('unsub-email');
    if (inp) inp.value = decodeURIComponent(email);
  }

  var form = document.getElementById('unsub-form');
  if (form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } })
        .then(function(r) {
          if (r.ok) {
            form.innerHTML = '<p style="color:#1B7A43;font-weight:600;font-size:1.1rem;">✓ 해지 완료<br><small style=\'font-weight:400;color:#6B7280;\'>구독이 해지되었습니다. 그동안 감사했습니다.</small></p>';
          } else {
            alert('오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
          }
        })
        .catch(function() { alert('네트워크 오류입니다.'); });
    });
  }
})();
</script>
</body>
</html>
