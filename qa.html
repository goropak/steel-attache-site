<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Q&amp;A — 철강 주재원</title>
<meta name="description" content="해외 철강·제철소 관련 질문을 남겨주세요. 보좌관·연구원·시장이 함께 주재원 글로 발행합니다.">
<link rel="stylesheet" href="style.css">
<style>
.qa-head { background: var(--steel); border-bottom: 3px solid var(--c-accent); padding: 2.5rem 0 2rem; }
.qa-head h1 { font-family: var(--font-head); font-size: 1.75rem; color: #fff; margin: 0 0 .4rem; }
.qa-head p  { color: #aeb8c2; font-size: .92rem; margin: 0 0 1.25rem; }
.qa-form-box { background: #1e2a38; border: 1px solid #3a4654; border-radius: 10px; padding: 1.5rem; margin-top: 1.25rem; }
.qa-form-box h3 { color: #fff; font-size: 1rem; margin: 0 0 1rem; }
.qa-form-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .6rem; }
.qa-form-box input,
.qa-form-box textarea,
.qa-form-box select {
  background: #11161d; border: 1.5px solid #3a4654; color: #fff;
  border-radius: 6px; padding: .55rem .85rem; font-size: .9rem;
  font-family: var(--font-body); width: 100%; box-sizing: border-box;
}
.qa-form-box input::placeholder,
.qa-form-box textarea::placeholder { color: #6b7a8a; }
.qa-form-box input:focus,
.qa-form-box textarea:focus,
.qa-form-box select:focus { outline: none; border-color: var(--c-accent); }
.qa-form-box textarea { resize: vertical; min-height: 90px; }
.qa-form-box select option { background: #11161d; }
.qa-submit-btn {
  padding: 11px 28px; background: var(--c-accent); color: #fff;
  border: none; border-radius: 99px; font-size: .9rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-body); margin-top: .5rem;
}
.qa-submit-btn:hover { opacity: .88; }
.qa-submit-btn:disabled { opacity: .5; cursor: not-allowed; }
.qa-form-note { color: #6b7a8a; font-size: .78rem; margin-top: .75rem; }
.qa-filter { display: flex; gap: .4rem; flex-wrap: wrap; padding: 1.25rem 0 0; }
.qa-filter button {
  padding: .3rem .85rem; border-radius: 99px; font-size: .82rem;
  cursor: pointer; background: transparent;
  border: 1px solid var(--c-border); color: var(--c-text-sub);
  font-family: var(--font-body);
}
.qa-filter button.active { background: var(--c-accent); color: #fff; border-color: transparent; }
.qa-board { margin-top: 1.25rem; border: 1px solid var(--c-border); border-radius: 10px; overflow: hidden; }
.qa-board-head {
  display: grid; grid-template-columns: 1fr 80px 90px 90px;
  padding: .6rem 1.25rem; background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  font-size: .78rem; font-weight: 700; color: var(--c-text-sub);
}
.qa-row {
  display: grid; grid-template-columns: 1fr 80px 90px 90px;
  padding: .85rem 1.25rem; border-bottom: 1px solid var(--c-border);
  align-items: center; transition: background .1s;
  cursor: pointer; user-select: none;
}
.qa-row:hover { background: var(--c-surface); }
.qa-row:hover .qa-row-title { color: var(--c-accent); }
.qa-row.open { background: var(--c-surface); }
.qa-row.open .qa-row-title { color: var(--c-accent); }
.qa-row-title { font-size: .95rem; font-weight: 600; color: var(--c-text); line-height: 1.35; display: flex; align-items: center; gap: .4rem; }
.qa-row-title .qa-cat {
  display: inline-block; font-size: .72rem; font-weight: 700;
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: 4px; padding: .1rem .4rem;
  color: var(--c-text-sub); flex-shrink: 0;
}
.qa-chevron { font-size: .7rem; color: var(--c-text-sub); transition: transform .2s; flex-shrink: 0; }
.qa-row.open .qa-chevron { transform: rotate(180deg); }
.qa-row-cat  { font-size: .82rem; color: var(--c-text-sub); }
.qa-row-date { font-size: .82rem; color: var(--c-text-sub); }
.badge { display: inline-flex; align-items: center; padding: .18rem .55rem; border-radius: 4px; font-size: .75rem; font-weight: 600; }
.badge-pending    { background: #f3f4f6; color: #6b7280; }
.badge-processing { background: #fef3c7; color: #92400e; }
.badge-published  { background: #d1fae5; color: #065f46; }
/* 아코디언 패널 */
.qa-detail {
  display: none; padding: 1rem 1.25rem 1.25rem;
  border-bottom: 1px solid var(--c-border);
  background: #0f1820;
}
.qa-detail.open { display: block; }
.qa-detail-content {
  font-size: .9rem; color: var(--c-text-sub); line-height: 1.75;
  white-space: pre-wrap; word-break: break-word;
  border-left: 3px solid var(--c-accent); padding-left: 1rem;
  margin-bottom: .85rem;
}
.qa-detail-meta { font-size: .78rem; color: #5a6a7a; margin-bottom: .75rem; }
.qa-article-btn {
  display: inline-flex; align-items: center; gap: .35rem;
  padding: .45rem 1.1rem; background: var(--c-accent); color: #fff;
  border-radius: 99px; font-size: .82rem; font-weight: 700;
  text-decoration: none; transition: opacity .15s;
}
.qa-article-btn:hover { opacity: .85; }
.qa-empty { text-align: center; padding: 3rem; color: var(--c-text-sub); font-size: .95rem; }
.qa-info { background: #fff8f0; border: 1px solid #f5d9b0; border-radius: 8px; padding: 1rem 1.25rem; margin-top: 1.5rem; font-size: .88rem; color: #7a4a00; line-height: 1.7; }
@media (max-width: 600px) {
  .qa-board-head, .qa-row { grid-template-columns: 1fr 70px; }
  .qa-row-cat, .qa-board-head .col-cat,
  .qa-row-date, .qa-board-head .col-date { display: none; }
}
</style>
</head>
<body>

<header class="masthead"><div class="wrap">
  <div class="mh-brand">
    <svg class="mh-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="1" y="1" width="38" height="38" rx="9" fill="#11161d" stroke="#3a4654"/>
      <path d="M20 8 L31 30 H9 Z" fill="none" stroke="#D62828" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M20 20 L26 30 H14 Z" fill="#D62828"/>
      <circle cx="20" cy="26.5" r="1.7" fill="#ffd9a8"/>
    </svg>
    <div class="mh-title"><a href="index.html">철강 주재원</a><span class="sub">Steel Attaché</span></div>
  </div>
  <nav class="mh-nav"><a href="index.html">홈</a><a href="qa.html" aria-current="page">Q&amp;A</a></nav>
</div></header>

<section class="qa-head">
  <div class="wrap">
    <h1>독자 Q&amp;A</h1>
    <p>해외 철강·제철소·무역 관련 질문을 남겨주세요.<br>검토 후 보좌관·연구원·시장이 함께 주재원 글로 발행합니다.</p>

    <div class="qa-form-box">
      <h3>✏ 질문 등록</h3>
      <div id="qa-form-wrap">
        <div class="qa-form-row">
          <input type="text" id="f-title" placeholder="질문 제목 (한 줄 요약)" required style="flex:2">
          <select id="f-category" style="flex:1;min-width:110px">
            <option value="">카테고리</option>
            <option value="중국">중국</option>
            <option value="일본">일본</option>
            <option value="미국">미국</option>
            <option value="유럽">유럽</option>
            <option value="인도">인도</option>
            <option value="포스코·현대제철">포스코·현대제철</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <textarea id="f-content" placeholder="질문 내용을 자유롭게 적어주세요." required></textarea>
        <div class="qa-form-row" style="margin-top:.6rem">
          <input type="email" id="f-email" placeholder="이메일 (답변 알림용, 비공개)">
          <input type="text" id="f-name" placeholder="이름 또는 닉네임 (선택)">
        </div>
        <button class="qa-submit-btn" id="qa-submit-btn" onclick="submitQuestion()">질문 등록</button>
      </div>
      <p class="qa-form-note">이메일은 공개되지 않으며 발행 알림 용도로만 사용됩니다.</p>
    </div>
  </div>
</section>

<main>
  <div class="wrap" style="padding-top:2rem;padding-bottom:3rem;">
    <div class="qa-info">
      📌 질문은 즉시 목록에 등재됩니다. <strong>발행됨</strong> 상태가 되면 주재원 글로 답변이 발행된 것입니다.
    </div>
    <div class="qa-filter" id="qa-filter">
      <button class="active" data-cat="">전체</button>
    </div>
    <div class="qa-board" id="qa-board">
      <div class="qa-board-head">
        <span>질문 제목</span>
        <span class="col-cat">카테고리</span>
        <span>상태</span>
        <span class="col-date">등록일</span>
      </div>
      <div class="qa-empty" id="qa-loading">불러오는 중…</div>
    </div>
  </div>
</main>

<footer class="foot"><div class="wrap">
  <div class="b">철강 주재원</div>
  <div class="s">포스코의 눈으로 읽는 세계 철강 분석 · © 2026 · 공개 자료 기반, 출처 명기</div>
</div></footer>

<script>
(function(){
  var BIN_ID = '6a4207a8da38895dfe0e3a49';
  var MASTER = '$2a$10$mls9sfMRYh36KcfjepWxqein1H/5xEIoRWy1Qy.vtFiNLSacqfL/O';
  var API_READ  = 'https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest';
  var API_WRITE = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

  var BADGE = {
    '접수됨':   '<span class="badge badge-pending">접수됨</span>',
    '리서치중': '<span class="badge badge-processing">리서치 중</span>',
    '발행됨':   '<span class="badge badge-published">발행됨 →</span>'
  };
  var allItems = [];
  var activeTab = '';

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderBoard(items){
    var board = document.getElementById('qa-board');
    board.querySelectorAll('.qa-row, .qa-detail, .qa-empty').forEach(function(r){ r.remove(); });
    if(!items.length){
      var e = document.createElement('div');
      e.className='qa-empty'; e.textContent='등록된 질문이 없습니다.';
      board.appendChild(e); return;
    }
    items.forEach(function(q){
      var badge = BADGE[q.status] || BADGE['접수됨'];
      var isPub = q.status==='발행됨' && q.post_url;

      // ── 행 ──
      var row = document.createElement('div');
      row.className = 'qa-row';
      row.setAttribute('role','button'); row.setAttribute('tabindex','0');
      row.innerHTML =
        '<div class="qa-row-title">'
          +(q.category?'<span class="qa-cat">'+esc(q.category)+'</span>':'')
          +'<span>'+esc(q.title)+'</span>'
          +'<span class="qa-chevron">▼</span>'
        +'</div>'
        +'<div class="qa-row-cat">'+esc(q.category||'')+'</div>'
        +'<div>'+badge+'</div>'
        +'<div class="qa-row-date">'+esc(q.date||'')+'</div>';

      // ── 상세 패널 ──
      var detail = document.createElement('div');
      detail.className = 'qa-detail';
      var metaParts = [];
      if(q.name) metaParts.push('질문자: '+esc(q.name));
      metaParts.push('등록일: '+esc(q.date||''));
      detail.innerHTML =
        '<div class="qa-detail-meta">'+metaParts.join(' · ')+'</div>'
        +'<div class="qa-detail-content">'+esc(q.content||'(내용 없음)')+'</div>'
        +(isPub ? '<a class="qa-article-btn" href="'+esc(q.post_url)+'" target="_blank">📄 발행된 기사 보기 ↗</a>' : '');

      // ── 토글 ──
      function toggle(){
        var isOpen = row.classList.contains('open');
        // 다른 열린 행 닫기
        board.querySelectorAll('.qa-row.open').forEach(function(r){ r.classList.remove('open'); });
        board.querySelectorAll('.qa-detail.open').forEach(function(d){ d.classList.remove('open'); });
        if(!isOpen){ row.classList.add('open'); detail.classList.add('open'); }
      }
      row.addEventListener('click', toggle);
      row.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); } });

      board.appendChild(row);
      board.appendChild(detail);
    });
  }

  function buildFilter(items){
    var cats=[]; items.forEach(function(q){ if(q.category&&cats.indexOf(q.category)<0) cats.push(q.category); });
    var f=document.getElementById('qa-filter');
    cats.forEach(function(c){
      var b=document.createElement('button'); b.dataset.cat=c; b.textContent=c;
      b.addEventListener('click',onFilter); f.appendChild(b);
    });
  }

  function onFilter(e){
    activeTab=e.target.dataset.cat||'';
    document.querySelectorAll('.qa-filter button').forEach(function(b){
      b.classList.toggle('active',(b.dataset.cat||'')===activeTab);
    });
    renderBoard(activeTab?allItems.filter(function(q){return q.category===activeTab;}):allItems);
  }
  document.querySelectorAll('.qa-filter button').forEach(function(b){ b.addEventListener('click',onFilter); });

  function loadBin(){
    fetch(API_READ, { headers:{'X-Master-Key':MASTER} })
      .then(function(r){ return r.json(); })
      .then(function(d){
        allItems = (d.record||[]).slice().sort(function(a,b){ return (b.date||'')>(a.date||'')?1:-1; });
        buildFilter(allItems);
        renderBoard(allItems);
      })
      .catch(function(){
        var l=document.getElementById('qa-loading');
        if(l) l.textContent='목록을 불러오지 못했습니다.';
      });
  }

  window.submitQuestion = function(){
    var title   = document.getElementById('f-title').value.trim();
    var cat     = document.getElementById('f-category').value;
    var content = document.getElementById('f-content').value.trim();
    var email   = document.getElementById('f-email').value.trim();
    var name    = document.getElementById('f-name').value.trim();
    if(!title){ alert('질문 제목을 입력하세요.'); return; }
    if(!content){ alert('질문 내용을 입력하세요.'); return; }

    var btn = document.getElementById('qa-submit-btn');
    btn.disabled=true; btn.textContent='등록 중…';

    // 1) 현재 bin 읽기
    fetch(API_READ, { headers:{'X-Master-Key':MASTER} })
      .then(function(r){ return r.json(); })
      .then(function(d){
        var current = d.record||[];
        var newQ = {
          id: 'q'+Date.now(),
          title: title,
          content: content,
          category: cat,
          email: email,
          name: name,
          status: '접수됨',
          date: new Date().toISOString().slice(0,10),
          post_url: ''
        };
        current.unshift(newQ);
        // 2) 업데이트된 배열 PUT
        return fetch(API_WRITE, {
          method:'PUT',
          headers:{'Content-Type':'application/json','X-Master-Key':MASTER},
          body: JSON.stringify(current)
        });
      })
      .then(function(r){ return r.json(); })
      .then(function(){
        document.getElementById('qa-form-wrap').innerHTML =
          '<p style="color:#d1fae5;font-weight:600;padding:.5rem 0;font-size:1rem;">✓ 질문이 등록됐습니다. 잠시 후 목록에 나타납니다.</p>';
        loadBin();
      })
      .catch(function(){
        btn.disabled=false; btn.textContent='질문 등록';
        alert('오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
      });
  };

  loadBin();
})();
</script>
</body>
</html>
