<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>관리자 — 철강 주재원</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--c-bg,#f5f3ee);}
.admin-wrap{max-width:780px;margin:0 auto;padding:2rem 1.5rem;}
.admin-section{background:var(--c-surface,#fff);border:1px solid var(--c-border,#e6e0d4);border-radius:10px;padding:1.5rem;margin-bottom:1.5rem;}
.admin-section h2{font-size:1rem;font-weight:700;margin:0 0 1rem;color:var(--c-ink,#11161d);}
.input-row{display:flex;gap:.5rem;margin-bottom:.75rem;}
.input-row input{flex:1;padding:.5rem .75rem;border:1px solid var(--c-border,#e6e0d4);border-radius:6px;font-size:.9rem;font-family:inherit;}
.btn{padding:.45rem 1rem;border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--accent,#D62828);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-ghost{background:transparent;border:1px solid var(--c-border,#e6e0d4);color:var(--c-ink,#11161d);}
.btn-ghost:hover{border-color:#999;}
.btn-danger{background:#fee2e2;color:#991b1b;}
.btn-danger:hover{background:#fca5a5;}
.btn-green{background:#d1fae5;color:#065f46;}
.btn-yellow{background:#fef3c7;color:#92400e;}
.sub-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.4rem;}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:var(--c-bg,#f5f3ee);border-radius:6px;font-size:.88rem;}
.sub-item span{color:var(--c-muted,#6b6459);font-size:.78rem;margin-left:.5rem;}
.empty-note{color:var(--c-muted,#6b6459);font-size:.88rem;text-align:center;padding:1rem;}
.stats{display:flex;gap:1rem;margin-bottom:1rem;}
.stat-box{flex:1;background:var(--c-bg,#f5f3ee);border-radius:8px;padding:.75rem 1rem;text-align:center;}
.stat-box .num{font-size:1.75rem;font-weight:800;color:var(--accent,#D62828);}
.stat-box .lbl{font-size:.78rem;color:var(--c-muted,#6b6459);}
.fs-bar{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:.88rem;margin-bottom:1rem;}
.fs-bar.connected{background:#d1fae5;color:#065f46;}
.fs-bar.disconnected{background:#f3f4f6;color:#6b7280;}
.fs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fs-bar.connected .fs-dot{background:#10b981;}
.fs-bar.disconnected .fs-dot{background:#9ca3af;}
/* 비밀번호 게이트 */
#gate{position:fixed;inset:0;background:var(--c-bg,#f5f3ee);display:flex;align-items:center;justify-content:center;z-index:999;}
.gate-box{background:#fff;border:1px solid var(--c-border,#e6e0d4);border-radius:12px;padding:2rem;width:320px;text-align:center;}
.gate-box h2{margin:0 0 1.25rem;font-size:1.1rem;}
.gate-box input{width:100%;padding:.55rem .75rem;border:1px solid var(--c-border,#e6e0d4);border-radius:6px;font-size:1rem;margin-bottom:.75rem;box-sizing:border-box;}
.gate-error{color:#D62828;font-size:.85rem;margin-top:.5rem;display:none;}
/* ── 탭 ── */
.admin-tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:2px solid var(--c-border,#e6e0d4);}
.admin-tab{padding:.55rem 1.25rem;background:transparent;border:none;font-size:.92rem;font-weight:600;cursor:pointer;color:var(--c-muted,#6b6459);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;}
.admin-tab.active{color:var(--accent,#D62828);border-bottom-color:var(--accent,#D62828);}
.admin-tab-panel{display:none;}
.admin-tab-panel.active{display:block;}
/* ── Q&A 패널 ── */
.qa-admin-list{display:flex;flex-direction:column;gap:.75rem;}
.qa-admin-item{background:var(--c-bg,#f5f3ee);border:1px solid var(--c-border,#e6e0d4);border-radius:8px;padding:1rem 1.1rem;}
.qa-admin-item.status-발행됨{border-left:3px solid #10b981;}
.qa-admin-item.status-리서치중{border-left:3px solid #f59e0b;}
.qa-admin-item.status-접수됨{border-left:3px solid #9ca3af;}
.qa-admin-title{font-weight:700;font-size:.95rem;margin-bottom:.3rem;color:var(--c-ink,#11161d);}
.qa-admin-meta{font-size:.78rem;color:var(--c-muted,#6b6459);margin-bottom:.6rem;}
.qa-admin-meta b{color:var(--c-ink,#11161d);}
.qa-admin-content{font-size:.88rem;color:#444;line-height:1.65;background:#fff;border-radius:6px;padding:.65rem .85rem;margin-bottom:.75rem;border:1px solid var(--c-border,#e6e0d4);}
.qa-admin-actions{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.qa-url-input{flex:1;min-width:200px;padding:.4rem .7rem;border:1px solid var(--c-border,#e6e0d4);border-radius:6px;font-size:.85rem;font-family:inherit;}
.badge{display:inline-flex;align-items:center;padding:.18rem .55rem;border-radius:4px;font-size:.75rem;font-weight:600;}
.badge-pending{background:#f3f4f6;color:#6b7280;}
.badge-processing{background:#fef3c7;color:#92400e;}
.badge-published{background:#d1fae5;color:#065f46;}
</style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="gate">
  <div class="gate-box">
    <div style="font-size:2rem;margin-bottom:.5rem;">🔒</div>
    <h2>관리자 전용</h2>
    <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn btn-primary" style="width:100%" onclick="checkPw()">입장</button>
    <div class="gate-error" id="pw-error">비밀번호가 틀렸습니다.</div>
  </div>
</div>

<header class="masthead"><div class="wrap">
  <div class="mh-brand">
    <svg class="mh-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="1" y="1" width="38" height="38" rx="9" fill="#11161d" stroke="#3a4654"/><path d="M20 8 L31 30 H9 Z" fill="none" stroke="#D62828" stroke-width="2.4" stroke-linejoin="round"/><path d="M20 20 L26 30 H14 Z" fill="#D62828"/><circle cx="20" cy="26.5" r="1.7" fill="#ffd9a8"/></svg>
    <div class="mh-title"><a href="index.html">철강 주재원</a><span class="sub">관리자</span></div>
  </div>
  <nav class="mh-nav"><a href="index.html">홈</a><a href="admin.html" aria-current="page">관리자</a><a href="https://goro-stacks.vercel.app/shelves/steelmaking/" target="_blank" rel="noopener" class="mh-partner">📚 고로문고 <span aria-hidden="true">↗</span></a></nav>
</div></header>

<div class="admin-wrap">

  <!-- 폴더 연결 상태 -->
  <div class="admin-section">
    <h2>로컬 파일 연결</h2>
    <div class="fs-bar disconnected" id="fs-bar">
      <div class="fs-dot"></div>
      <span id="fs-label">연결 안 됨 — 변경 사항이 파일에 저장되지 않습니다</span>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center;">
      <button class="btn btn-primary" onclick="connectFolder()">📁 site/data 폴더 연결</button>
      <span style="font-size:.82rem;color:var(--c-muted,#6b6459);">연결하면 구독자·Q&A 변경 시 자동으로 파일에 저장됩니다</span>
    </div>
  </div>

  <!-- 탭 -->
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('subscribers',this)">구독자 관리</button>
    <button class="admin-tab" onclick="switchTab('qa',this)">Q&amp;A 관리</button>
  </div>

  <!-- ── 구독자 탭 ── -->
  <div class="admin-tab-panel active" id="panel-subscribers">

    <div class="admin-section">
      <div class="stats">
        <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">구독자</div></div>
        <div class="stat-box"><div class="num" id="stat-posco">0</div><div class="lbl">posco.com</div></div>
      </div>

      <h2>구독자 추가</h2>
      <div class="input-row">
        <input type="email" id="new-email" placeholder="name@posco.com" onkeydown="if(event.key==='Enter')addSub()">
        <input type="text" id="new-name" placeholder="이름 (선택)" style="max-width:120px" onkeydown="if(event.key==='Enter')addSub()">
        <button class="btn btn-primary" onclick="addSub()">추가</button>
      </div>

      <h2>구독자 목록</h2>
      <ul class="sub-list" id="sub-list"><li class="empty-note">구독자가 없습니다.</li></ul>
    </div>

    <div class="admin-section">
      <h2>위험 영역</h2>
      <button class="btn btn-danger" onclick="clearAll()">전체 구독자 삭제</button>
    </div>

  </div>

  <!-- ── Q&A 탭 ── -->
  <div class="admin-tab-panel" id="panel-qa">

    <div class="admin-section">
      <div class="stats">
        <div class="stat-box"><div class="num" id="qa-stat-total">0</div><div class="lbl">전체</div></div>
        <div class="stat-box"><div class="num" id="qa-stat-pending">0</div><div class="lbl">접수됨</div></div>
        <div class="stat-box"><div class="num" id="qa-stat-processing">0</div><div class="lbl">리서치중</div></div>
        <div class="stat-box"><div class="num" id="qa-stat-published">0</div><div class="lbl">발행됨</div></div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2 style="margin:0">질문 목록</h2>
        <button class="btn btn-ghost" onclick="reloadQA()">↻ 새로고침</button>
      </div>

      <div class="qa-admin-list" id="qa-admin-list">
        <div class="empty-note">폴더를 연결한 후 확인하세요.</div>
      </div>
    </div>

    <div class="admin-section">
      <h2>새 질문 직접 추가 (수동)</h2>
      <div style="display:flex;flex-direction:column;gap:.5rem;">
        <input type="text" id="qa-new-title" placeholder="질문 제목" style="padding:.5rem .75rem;border:1px solid var(--c-border,#e6e0d4);border-radius:6px;font-size:.9rem;font-family:inherit;">
        <div style="display:flex;gap:.5rem;">
          <select id="qa-new-cat" style="padding:.5rem .75rem;border:1px solid var(--c-border,#e6e0d4);border-radius:6px;font-size:.9rem;font-family:inherit;flex:1;">
            <option value="">카테고리</option>
            <option value="중국">중국</option>
            <option value="일본">일본</option>
            <option value="미국">미국</option>
            <option value="유럽">유럽</option>
            <option value="인도">인도</option>
            <option value="포스코·현대제철">포스코·현대제철</option>
            <option value="기타">기타</option>
          </select>
          <input type="email" id="qa-new-email" placeholder="이메일 (선택)" style="flex:2;padding:.5rem .75rem;border:1px solid var(--c-border,#e6e0d4);border-radius:6px;font-size:.9rem;font-family:inherit;">
        </div>
        <textarea id="qa-new-content" placeholder="질문 내용" style="padding:.5rem .75rem;border:1px solid var(--c-border,#e6e0d4);border-radius:6px;font-size:.9rem;font-family:inherit;min-height:80px;resize:vertical;"></textarea>
        <button class="btn btn-primary" style="align-self:flex-start" onclick="addQA()">질문 추가</button>
      </div>
    </div>

  </div>

</div>

<script>
// ── 비밀번호 게이트 ──────────────────────────────────────────
var ADMIN_PW = 'bf2026';

function checkPw(){
  var v = document.getElementById('pw-input').value;
  if(v === ADMIN_PW){
    localStorage.setItem('sa_admin_auth','1');
    document.getElementById('gate').style.display='none';
    init();
  } else {
    document.getElementById('pw-error').style.display='block';
  }
}

(function(){
  if(localStorage.getItem('sa_admin_auth')==='1'){
    document.getElementById('gate').style.display='none';
    init();
  }
})();

// ── 탭 전환 ─────────────────────────────────────────────────
function switchTab(name, btn){
  document.querySelectorAll('.admin-tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.admin-tab-panel').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── 상태 ────────────────────────────────────────────────────
var KEY = 'sa_subscribers';
var dirHandle = null;
// ── JSONBin (Q&A) ─────────────────────────────────────────────
var BIN_ID = '6a4207a8da38895dfe0e3a49';
var MASTER = '$2a$10$mls9sfMRYh36KcfjepWxqein1H/5xEIoRWy1Qy.vtFiNLSacqfL/O';
var BIN_READ  = 'https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest';
var BIN_WRITE = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
var DB_NAME   = 'sa_admin_db';
var DB_STORE  = 'handles';

// ── IndexedDB ────────────────────────────────────────────────
function openDB(){
  return new Promise(function(res, rej){
    var req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = function(e){ e.target.result.createObjectStore(DB_STORE); };
    req.onsuccess = function(e){ res(e.target.result); };
    req.onerror   = function(e){ rej(e); };
  });
}
function saveHandle(h){
  return openDB().then(function(db){
    return new Promise(function(res,rej){
      var tx = db.transaction(DB_STORE,'readwrite');
      tx.objectStore(DB_STORE).put(h,'dirHandle');
      tx.oncomplete=res; tx.onerror=rej;
    });
  });
}
function loadHandle(){
  return openDB().then(function(db){
    return new Promise(function(res,rej){
      var tx = db.transaction(DB_STORE,'readonly');
      var req = tx.objectStore(DB_STORE).get('dirHandle');
      req.onsuccess=function(e){ res(e.target.result||null); };
      req.onerror=rej;
    });
  });
}

// ── 폴더 연결 ────────────────────────────────────────────────
async function connectFolder(){
  if(!window.showDirectoryPicker){ alert('Chrome/Edge에서만 지원됩니다.'); return; }
  try {
    var h = await window.showDirectoryPicker({mode:'readwrite'});
    dirHandle = h;
    await saveHandle(h);
    setFsBar(h.name);
    await readSubsFile();
    await readQAFile();
    loadSubs();
    loadQA();
  } catch(e){
    if(e.name !== 'AbortError') alert('폴더 연결 실패: ' + e.message);
  }
}

// ── 파일 읽기 ────────────────────────────────────────────────
async function readSubsFile(){
  if(!dirHandle) return;
  try {
    var fh = await dirHandle.getFileHandle('subscribers.json',{create:false});
    var text = await (await fh.getFile()).text();
    var arr = JSON.parse(text);
    if(Array.isArray(arr) && arr.length > 0) localStorage.setItem(KEY, JSON.stringify(arr,null,2));
  } catch(e){}
}

async function readQAFile(){ /* JSONBin 사용 — 별도 파일 읽기 불필요 */ }

function setFsBar(name){
  var bar = document.getElementById('fs-bar');
  bar.className = 'fs-bar connected';
  document.getElementById('fs-label').textContent = '연결됨: ' + name + ' — 변경 시 자동 저장';
}

// ── 파일 쓰기 ────────────────────────────────────────────────
async function writeSubsFile(){
  if(!dirHandle) return;
  try {
    var fh = await dirHandle.getFileHandle('subscribers.json',{create:true});
    var w  = await fh.createWritable();
    await w.write(JSON.stringify(getSubs(),null,2));
    await w.close();
  } catch(e){ if(e.name==='NotAllowedError'){ await dirHandle.requestPermission({mode:'readwrite'}); await writeSubsFile(); } }
}

async function writeQAFile(arr){
  await fetch(BIN_WRITE, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':MASTER},
    body: JSON.stringify(arr)
  });
}

// ── 구독자 관리 ──────────────────────────────────────────────
function getSubs(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
function saveSubs(arr){ localStorage.setItem(KEY,JSON.stringify(arr,null,2)); writeSubsFile(); }

function loadSubs(){
  var subs = getSubs();
  document.getElementById('stat-total').textContent = subs.length;
  document.getElementById('stat-posco').textContent = subs.filter(function(s){ return s.email.endsWith('@posco.com'); }).length;
  var list = document.getElementById('sub-list');
  if(!subs.length){ list.innerHTML = '<li class="empty-note">구독자가 없습니다.</li>'; return; }
  list.innerHTML = subs.map(function(s,i){
    return '<li class="sub-item">'
      + '<div>' + esc(s.email) + (s.name ? '<span>' + esc(s.name) + '</span>' : '') + '</div>'
      + '<button class="btn btn-danger" style="padding:.25rem .6rem;font-size:.78rem" onclick="removeSub('+i+')">삭제</button>'
      + '</li>';
  }).join('');
}

function addSub(){
  var email = document.getElementById('new-email').value.trim().toLowerCase();
  var name  = document.getElementById('new-name').value.trim();
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert('유효한 이메일을 입력하세요.'); return; }
  var subs = getSubs();
  if(subs.some(function(s){ return s.email===email; })){ alert('이미 등록된 이메일입니다.'); return; }
  subs.push({email:email, name:name, added:new Date().toISOString().slice(0,10)});
  saveSubs(subs);
  document.getElementById('new-email').value='';
  document.getElementById('new-name').value='';
  loadSubs();
}

function removeSub(i){ var subs=getSubs(); subs.splice(i,1); saveSubs(subs); loadSubs(); }
function clearAll(){ if(!confirm('전체 구독자를 삭제?')) return; saveSubs([]); loadSubs(); }

// ── Q&A 관리 (JSONBin) ────────────────────────────────────────
var _qaItems = [];  // 메모리 캐시

function reloadQA(){ loadQA(); }

async function loadQA(){
  document.getElementById('qa-admin-list').innerHTML = '<div class="empty-note">불러오는 중…</div>';
  try {
    var r = await fetch(BIN_READ, { headers:{'X-Master-Key':MASTER} });
    var d = await r.json();
    _qaItems = (d.record||[]).slice().sort(function(a,b){ return (b.date||'')>(a.date||'')?1:-1; });
  } catch(e){ _qaItems=[]; }
  renderQA(_qaItems);
}

function renderQA(items){
  document.getElementById('qa-stat-total').textContent = items.length;
  document.getElementById('qa-stat-pending').textContent    = items.filter(function(q){ return q.status==='접수됨'; }).length;
  document.getElementById('qa-stat-processing').textContent = items.filter(function(q){ return q.status==='리서치중'; }).length;
  document.getElementById('qa-stat-published').textContent  = items.filter(function(q){ return q.status==='발행됨'; }).length;

  var list = document.getElementById('qa-admin-list');
  if(!items.length){ list.innerHTML='<div class="empty-note">질문이 없습니다.</div>'; return; }
  list.innerHTML='';
  items.forEach(function(q, i){
    var badgeMap={'접수됨':'badge-pending','리서치중':'badge-processing','발행됨':'badge-published'};
    var badgeCls = badgeMap[q.status]||'badge-pending';
    var item = document.createElement('div');
    item.className='qa-admin-item status-'+(q.status||'접수됨');
    item.innerHTML =
      '<div class="qa-admin-title">'+esc(q.title)+'</div>'
      +'<div class="qa-admin-meta">'
        +'<b>카테고리:</b> '+esc(q.category||'—')+' &nbsp;'
        +'<b>날짜:</b> '+esc(q.date||'—')+' &nbsp;'
        +'<b>이메일:</b> '+esc(q.email||'—')+' &nbsp;'
        +'<span class="badge '+badgeCls+'">'+esc(q.status||'접수됨')+'</span>'
      +'</div>'
      +'<div class="qa-admin-content">'+esc(q.content||'(내용 없음)')+'</div>'
      +'<div class="qa-admin-actions">'
        +(q.status!=='리서치중' ? '<button class="btn btn-yellow" onclick="setQAStatus(\''+q.id+'\',\'리서치중\')">리서치중으로</button>' : '')
        +(q.status!=='발행됨'   ? '<input type="text" class="qa-url-input" id="url-'+i+'" placeholder="posts/xxx.html" value="'+esc(q.post_url||'')+'">'
                                 +'<button class="btn btn-green" onclick="publishQA(\''+q.id+'\','+i+')">발행됨으로</button>' : '')
        +(q.status==='발행됨'&&q.post_url ? '<a href="'+esc(q.post_url)+'" target="_blank" class="btn btn-ghost">글 보기 ↗</a>' : '')
        +'<button class="btn btn-danger" style="margin-left:auto" onclick="deleteQA(\''+q.id+'\')">삭제</button>'
      +'</div>';
    list.appendChild(item);
  });
}

async function setQAStatus(id, status){
  var items = _qaItems.slice();
  var q = items.find(function(q){ return q.id===id; });
  if(!q) return;
  q.status = status;
  await writeQAFile(items);
  _qaItems = items; renderQA(_qaItems);
}

async function publishQA(id, i){
  var url = document.getElementById('url-'+i)?.value.trim();
  if(!url){ alert('발행된 글 URL을 입력하세요.'); return; }
  var items = _qaItems.slice();
  var q = items.find(function(q){ return q.id===id; });
  if(!q) return;
  q.status='발행됨'; q.post_url=url;
  await writeQAFile(items);
  _qaItems=items; renderQA(_qaItems);
}

async function deleteQA(id){
  if(!confirm('이 질문을 삭제하시겠습니까?')) return;
  var items = _qaItems.filter(function(q){ return q.id!==id; });
  await writeQAFile(items);
  _qaItems=items; renderQA(_qaItems);
}

async function addQA(){
  var title   = document.getElementById('qa-new-title').value.trim();
  var cat     = document.getElementById('qa-new-cat').value;
  var email   = document.getElementById('qa-new-email').value.trim();
  var content = document.getElementById('qa-new-content').value.trim();
  if(!title){ alert('제목을 입력하세요.'); return; }
  var items = _qaItems.slice();
  items.unshift({ id:'q'+Date.now(), title:title, content:content, category:cat, email:email,
    status:'접수됨', date:new Date().toISOString().slice(0,10), post_url:'' });
  await writeQAFile(items);
  _qaItems=items; renderQA(_qaItems);
  document.getElementById('qa-new-title').value='';
  document.getElementById('qa-new-cat').value='';
  document.getElementById('qa-new-email').value='';
  document.getElementById('qa-new-content').value='';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 초기화 ───────────────────────────────────────────────────
async function init(){
  loadSubs();
  loadQA();  // JSONBin에서 Q&A 로드
  try {
    var h = await loadHandle();
    if(h){
      var perm = await h.queryPermission({mode:'readwrite'});
      if(perm === 'granted'){
        dirHandle = h;
        setFsBar(h.name);
        await readSubsFile();
        loadSubs();
      }
    }
  } catch(e){}
}
</script>
